<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="온라인으로 초파일 연등을 달고 소원을 남기는 페이지"
    />
    <title>소원 연등</title>
    <script>
      (() => {
        let savedTheme = null;
        try {
          savedTheme = localStorage.getItem("wishBuddha:theme");
        } catch (error) {
          savedTheme = null;
        }
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="메인 조작">
        <div class="topbar-actions">
          <p class="page-count" id="pageCount">1 / 1</p>
          <button class="theme-toggle" id="themeToggle" type="button">
            <span class="theme-icon" aria-hidden="true"></span>
            <span id="themeToggleText">Dark</span>
          </button>
        </div>
      </header>

      <main class="main-stage" aria-label="소원 연등">
        <section class="lantern-field" aria-label="연등 목록">
          <div class="lantern-grid" id="lanternGrid"></div>
          <nav class="pagination" aria-label="연등 페이지">
            <button class="page-button" id="prevPage" type="button" aria-label="이전 페이지">←</button>
            <span class="page-status" id="pageStatus">1 / 1</span>
            <button class="page-button" id="nextPage" type="button" aria-label="다음 페이지">→</button>
          </nav>
        </section>
      </main>

      <div class="bottom-left-tools">
        <button class="share-link-button" id="shareLinkButton" type="button" aria-label="링크 공유" title="링크 공유">
          <svg class="share-link-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.4 14.6 14.6 9.4" />
            <path d="M11 6.5 12.2 5.3a4.2 4.2 0 0 1 6 5.9L16.5 13" />
            <path d="M13 17.5 11.8 18.7a4.2 4.2 0 0 1-6-5.9L7.5 11" />
          </svg>
          <span>공유</span>
        </button>

        <aside class="ad-ticker" aria-label="광고">
          <span class="ad-label">광고</span>
          <span class="ad-message" id="adMessage" aria-live="polite"></span>
        </aside>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <dialog class="modal wish-modal" id="wishFormDialog" aria-labelledby="wishFormTitle">
      <form class="modal-panel" id="wishForm" method="dialog">
        <button class="icon-close" type="button" data-close-dialog aria-label="닫기">×</button>
        <div class="dialogue-box">
          <img class="dialogue-npc" src="./img/npc_up.png" alt="" />
          <div class="dialogue-copy">
            <h2 id="wishFormTitle" data-prompt="연등에 소원을 입력하세요">연등에 소원을 입력하세요</h2>
            <p class="dialogue-line" data-prompt="소원은 수정할 수 없으니 염원을 담아 신중히 입력하세요."></p>
          </div>
        </div>

        <input type="hidden" id="slotIndex" name="slotIndex" />

        <div class="game-form-grid">
          <label class="field">
            <span>이름</span>
            <input id="wishName" name="name" type="text" maxlength="12" autocomplete="name" required />
          </label>

          <label class="field">
            <span>소원 내용</span>
            <textarea id="wishContent" name="content" maxlength="120" rows="5" required></textarea>
          </label>

          <fieldset class="color-field">
            <legend>연등 색상</legend>
            <div class="color-options">
              <label class="color-option red" title="빨강">
                <input type="radio" name="color" value="red" aria-label="빨강" required />
                <span aria-hidden="true"></span>
              </label>
              <label class="color-option green" title="초록">
                <input type="radio" name="color" value="green" aria-label="초록" />
                <span aria-hidden="true"></span>
              </label>
              <label class="color-option blue" title="파랑">
                <input type="radio" name="color" value="blue" aria-label="파랑" />
                <span aria-hidden="true"></span>
              </label>
              <label class="color-option yellow" title="노랑">
                <input type="radio" name="color" value="yellow" aria-label="노랑" />
                <span aria-hidden="true"></span>
              </label>
            </div>
          </fieldset>

          <div class="modal-actions">
            <button class="button ghost" type="button" data-close-dialog>취소</button>
            <button class="button primary" type="submit">입력 완료</button>
          </div>
        </div>
      </form>
    </dialog>

    <dialog class="modal confirm-modal" id="confirmDialog" aria-labelledby="confirmTitle">
      <form class="modal-panel" method="dialog">
        <button class="icon-close" type="button" data-close-dialog aria-label="닫기">×</button>
        <h2 id="confirmTitle">이대로 연등에 소원을 담을까요?</h2>
        <p>소원은 한 번 입력하면 수정할 수 없습니다.</p>
        <div class="confirm-preview" id="confirmPreview"></div>
        <div class="modal-actions">
          <button class="button ghost" id="confirmBack" type="button">다시 볼게요</button>
          <button class="button primary" id="confirmSubmit" type="button">소원 담기</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal view-modal" id="wishViewDialog" aria-labelledby="wishViewTitle">
      <article class="modal-panel wish-view">
        <button class="icon-close" type="button" data-close-dialog aria-label="닫기">×</button>
        <div class="wish-paper">
          <img class="wish-paper-img" src="./img/paper_long.png" alt="" />
          <h2 id="wishViewTitle"></h2>
          <p id="wishViewContent"></p>
        </div>
      </article>
    </dialog>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./app.js"></script>
  </body>
</html>
